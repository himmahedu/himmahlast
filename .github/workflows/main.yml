name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - name: Create fresh Flutter project
        run: |
          cd /tmp
          flutter create --platforms android himmah_build
          cd himmah_build
          rm -rf lib pubspec.yaml assets
          cp -r $GITHUB_WORKSPACE/lib .
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          cp -r $GITHUB_WORKSPACE/assets . 2>/dev/null || true
          cp $GITHUB_WORKSPACE/google-services.json android/app/ 2>/dev/null || true
      - name: Fix Android SDK version
        run: |
          cd /tmp/himmah_build/android
          cat > app/build.gradle.kts << 'GRADLEEOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
              id("com.google.gms.google-services")
          }
          android {
              namespace = "com.example.himmah_app"
              compileSdk = 35
              defaultConfig {
                  applicationId = "com.example.himmah_app"
                  minSdk = 23
                  targetSdk = 35
                  versionCode = 1
                  versionName = "1.0"
              }
              buildTypes {
                  release {
                      signingConfig = signingConfigs.getByName("debug")
                  }
              }
          }
          flutter {
              source = "../.."
          }
          GRADLEEOF
          rm -f app/build.gradle
      - name: Fix Android Gradle Plugin version
        run: |
          cd /tmp/himmah_build/android
          cat > build.gradle.kts << 'GRADLEEOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath("com.android.tools.build:gradle:8.6.0")
                  classpath("com.google.gms:google-services:4.4.0")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:2.0.0")
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          GRADLEEOF
      - name: Fix Gradle wrapper
        run: |
          cd /tmp/himmah_build/android
          sed -i 's/gradle-7.5-all.zip/gradle-8.7-all.zip/g' gradle/wrapper/gradle-wrapper.properties
      - name: Build APK
        run: |
          cd /tmp/himmah_build
          flutter clean
          flutter pub get
          flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: /tmp/himmah_build/build/app/outputs/flutter-apk/app-release.apk
